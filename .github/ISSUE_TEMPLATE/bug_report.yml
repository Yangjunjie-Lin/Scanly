name: Bug report
description: Report a reproducible Scanly defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please remove QR payloads, credentials, and personal images before posting publicly.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected and actual behavior.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system/device
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Non-sensitive console errors
