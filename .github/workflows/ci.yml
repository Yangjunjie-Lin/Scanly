name: CI

on:
  push:
    branches:
      - main
      - master
      - architecture/sdk-v2-foundation
  pull_request:

jobs:
  verify:
    name: Lint, typecheck, test, build, e2e, smoke benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate fixtures
        run: npm run fixtures:generate

      - name: Generate scenarios
        run: npm run scenarios:generate

      - name: Generated fixture/scenario drift
        run: git diff --exit-code -- fixtures scenarios

      - name: Repository quality contracts
        run: npm run quality:gates

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Documentation links
        run: npm run docs:check

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npx vitest run tests/integration

      - name: Coverage
        run: npm run test:coverage

      - name: SDK package builds
        run: npm run build:packages

      - name: Native ESM package import smoke
        run: npm run packages:smoke

      - name: Package tarball and installed-export verification
        run: npm run packages:tarball

      - name: Tracked package output drift
        run: git diff --exit-code -- packages engines

      - name: Production build
        run: npm run build:web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Playwright smoke E2E
        run: npm run test:e2e

      - name: Benchmark smoke (regression gate)
        run: npm run benchmark:smoke

      - name: Verify smoke benchmark artifacts
        run: |
          test -f benchmark-results/smoke-balanced.json
          test -f benchmark-results/smoke-balanced.csv

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Upload smoke benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke
          if-no-files-found: error
          path: |
            benchmark-results/smoke-balanced.json
            benchmark-results/smoke-balanced.csv
