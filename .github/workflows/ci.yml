name: CI

on:
  push:
    branches:
      - main
      - master
      - architecture/sdk-v2-foundation
      - architecture/sdk-v2-alpha3-industrial-validation
      - architecture/sdk-v2-alpha4-zxing-cpp-wasm
      - architecture/sdk-v2-alpha5-multisymbology-foundation
      - develop/sdk-v2
  pull_request:

jobs:
  verify:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify pinned WASM asset
        run: npm run wasm:verify

      - name: Generate fixtures
        run: npm run fixtures:generate

      - name: Generate scenarios
        run: npm run scenarios:generate

      - name: Generated fixture/scenario drift
        run: git diff --exit-code -- fixtures scenarios

      - name: Static quality contracts
        run: npm run quality:static

      - name: Canonical evidence contracts
        shell: bash
        run: |
          if [[ -f benchmark-results/canonical/canonical-evidence-manifest.json ]]; then
            echo "Canonical manifest present; enforcing strict release evidence mode."
            npm run quality:evidence:release
          else
            echo "::notice::Alpha.3 evidence bootstrap state: strict release evidence will become mandatory when the canonical manifest is committed."
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Documentation links
        run: npm run docs:check

      - name: Unit tests
        run: npm run test:unit

      - name: Multi-Symbology Unit Tests
        run: npm run test:symbologies

      - name: Integration tests
        run: npx vitest run tests/integration

      - name: Coverage
        run: npm run test:coverage

      - name: SDK package builds
        run: npm run build:packages

      - name: Native ESM package import smoke
        run: npm run packages:smoke

      - name: Package tarball and installed-export verification
        run: npm run packages:tarball

      - name: Tracked package output drift
        run: git diff --exit-code -- packages engines

      - name: Production build
        run: npm run build:web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Playwright smoke E2E
        run: npm run test:e2e

      - name: Benchmark smoke (regression gate)
        run: npm run benchmark:smoke

      - name: Multi-symbology benchmark
        run: npm run benchmark:symbologies

      - name: Verify smoke benchmark artifacts
        run: |
          test -f benchmark-results/development/smoke-balanced.json
          test -f benchmark-results/development/smoke-balanced.csv

      - name: Bundle cost report
        run: npm run bundle:analyze

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Upload smoke benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke
          if-no-files-found: error
          path: |
            benchmark-results/development/smoke-balanced.json
            benchmark-results/development/smoke-balanced.csv
            benchmark-results/ci/bundle-cost.json

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run wasm:build
      - run: npm run wasm:verify
      - name: Verify reproducible tracked artifact
        run: git diff --exit-code -- engines/zxing-cpp-wasm/wasm

  node-wasm:
    name: Node Multi-Symbology Integration
    needs: wasm-build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run test:symbologies
      - run: npx vitest run tests/integration/zxing-cpp-wasm.test.ts tests/unit/zxing-cpp-wasm-loader.test.ts
      - run: npm run test:wasm:memory -- --iterations=1000

  browser-wasm:
    name: Browser Multi-Symbology Integration
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npx playwright test --grep "multi-format worker"

  package-tarball:
    name: Package Tarball
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build:packages
      - run: npm run packages:smoke
      - run: npm run packages:tarball
