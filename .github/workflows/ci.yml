name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    name: Lint, typecheck, test, build, e2e, smoke benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate fixtures
        run: npm run fixtures:generate

      - name: Repository quality contracts
        run: npm run quality:gates

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Coverage
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke E2E
        run: npm run test:e2e

      - name: Benchmark smoke (regression gate)
        run: npm run benchmark:smoke

      - name: Upload smoke benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke
          path: |
            benchmark-results/latest.json
            benchmark-results/latest.csv
