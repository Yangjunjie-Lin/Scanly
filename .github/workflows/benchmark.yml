name: Full Benchmark

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop/sdk-v2
  push:
    branches:
      - main
      - architecture/sdk-v2-alpha3-industrial-validation
      - architecture/sdk-v2-alpha4-zxing-cpp-wasm
      - architecture/sdk-v2-alpha5-multisymbology-foundation

permissions:
  contents: read

jobs:
  symbologies:
    name: Symbologies
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run wasm:verify
      - run: npm run fixtures:generate
      - run: git diff --exit-code -- fixtures
      - run: npm run benchmark:symbologies -- --output=benchmark-results/ci/symbologies.json
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-symbologies
          retention-days: 21
          if-no-files-found: error
          path: benchmark-results/ci/symbologies.json

  prepare:
    name: Prepare
    runs-on: windows-latest
    outputs:
      gate-mode: ${{ steps.gate-mode.outputs.mode }}
      baseline-id: ${{ steps.gate-mode.outputs.baseline-id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run wasm:verify
      - run: npm run fixtures:generate
      - run: npm run scenarios:generate
      - name: Verify deterministic fixture and scenario generation
        run: git diff --exit-code -- fixtures scenarios
      - name: Verify clean checkout
        run: git status --porcelain --untracked-files=all | Tee-Object -Variable status; if ($status) { throw "prepare checkout is dirty" }
      - name: Select benchmark gate mode
        id: gate-mode
        shell: pwsh
        run: npx tsx scripts/select-benchmark-gate-mode.ts --runtime-family=node24-win32-x64 --registry=benchmark-results/baselines/registry.json --github-output="$env:GITHUB_OUTPUT"
      - name: Summarize benchmark gate mode
        shell: pwsh
        env:
          SELECTED_MODE: ${{ steps.gate-mode.outputs.mode }}
          SELECTED_BASELINE_ID: ${{ steps.gate-mode.outputs.baseline-id }}
          SELECTION_REASON: ${{ steps.gate-mode.outputs.reason }}
        run: |
          "Full Benchmark gate mode: $env:SELECTED_MODE" >> $env:GITHUB_STEP_SUMMARY
          if ($env:SELECTED_BASELINE_ID) { "Active baseline: $env:SELECTED_BASELINE_ID" >> $env:GITHUB_STEP_SUMMARY }
          "Selection reason: $env:SELECTION_REASON" >> $env:GITHUB_STEP_SUMMARY

  profile:
    needs: prepare
    name: ${{ matrix.label }}
    runs-on: windows-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: fast
            label: Fast
            report: latest-fast
          - profile: balanced
            label: Balanced
            report: latest
          - profile: robust
            label: Robust
            report: latest-robust
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run wasm:verify
      - run: npm run fixtures:generate
      - run: npm run scenarios:generate
      - run: git diff --exit-code -- fixtures scenarios
      - name: Verify clean profile checkout
        run: git status --porcelain --untracked-files=all | Tee-Object -Variable status; if ($status) { throw "profile checkout is dirty" }
      - run: npx tsx scripts/run-benchmark.ts --canonical-candidate --profile=${{ matrix.profile }} --gate --gate-mode=${{ needs.prepare.outputs.gate-mode }} --warmup-iterations=1 --measured-iterations=3
      - run: npm run benchmark:summary -- --report=benchmark-results/candidates/${{ matrix.report }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.profile }}
          retention-days: 21
          if-no-files-found: error
          path: |
            benchmark-results/candidates/${{ matrix.report }}.json
            benchmark-results/candidates/${{ matrix.report }}.csv

  comparison:
    needs: prepare
    name: Comparison
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run wasm:verify
      - run: npm run fixtures:generate
      - run: npm run scenarios:generate
      - run: git diff --exit-code -- fixtures scenarios
      - name: Verify clean comparison checkout
        run: git status --porcelain --untracked-files=all | Tee-Object -Variable status; if ($status) { throw "comparison checkout is dirty" }
      - run: npm run benchmark:compare -- --canonical-candidate --warmup-iterations=1 --measured-iterations=3
      - run: npm run benchmark:summary -- --report=benchmark-results/candidates/comparison.json
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-comparison
          retention-days: 21
          if-no-files-found: error
          path: benchmark-results/candidates/comparison.json

  assemble:
    needs: [profile, comparison]
    name: Assemble
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          merge-multiple: true
          path: benchmark-artifacts
      - run: npm run benchmark:assemble-canonical -- --fast=benchmark-artifacts/latest-fast.json --fast-csv=benchmark-artifacts/latest-fast.csv --balanced=benchmark-artifacts/latest.json --balanced-csv=benchmark-artifacts/latest.csv --robust=benchmark-artifacts/latest-robust.json --robust-csv=benchmark-artifacts/latest-robust.csv --comparison=benchmark-artifacts/comparison.json --output=benchmark-artifacts/canonical
      - run: npm run benchmark:verify-evidence -- --mode=baseline-bootstrap --canonical-manifest=benchmark-artifacts/canonical/canonical-evidence-manifest.json
      - run: npm run benchmark:summary -- --manifest=benchmark-artifacts/canonical/canonical-evidence-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-assembled
          retention-days: 21
          if-no-files-found: error
          path: benchmark-artifacts/canonical
