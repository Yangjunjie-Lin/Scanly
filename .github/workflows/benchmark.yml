name: Full Benchmark

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - architecture/sdk-v2-foundation
    paths:
      - "packages/core/**"
      - "packages/node/**"
      - "packages/benchmark/**"
      - "packages/scenario-schema/**"
      - "packages/parsers/**"
      - "packages/browser/**"
      - "engines/**"
      - "fixtures/**"
      - "scenarios/**"
      - "scripts/run-benchmark.ts"
      - "scripts/compare-engines.ts"
      - "scripts/generate-fixtures.ts"
      - "scripts/export-scenarios.ts"
      - "apps/web-demo/**"
      - "package.json"
      - "package-lock.json"

jobs:
  full-benchmark:
    name: Full fixture benchmark
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate fixtures
        run: npm run fixtures:generate

      - name: Generate scenarios
        run: npm run scenarios:generate

      - name: Run fast profile benchmark with regression gate
        run: npx tsx scripts/run-benchmark.ts --profile=fast --gate

      - name: Run balanced profile benchmark with regression gate
        run: npx tsx scripts/run-benchmark.ts --profile=balanced --gate

      - name: Run robust profile benchmark with regression gate
        run: npx tsx scripts/run-benchmark.ts --profile=robust --gate

      - name: Verify canonical benchmark and repository contracts
        run: npm run quality:gates

      - name: Verify generated artifact drift
        run: git diff --exit-code -- fixtures scenarios

      - name: Run internal engine/scenario comparison
        run: npm run benchmark:compare

      - name: Upload benchmark artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-full
          if-no-files-found: error
          path: |
            benchmark-results/latest.json
            benchmark-results/latest.csv
            benchmark-results/latest-fast.json
            benchmark-results/latest-fast.csv
            benchmark-results/latest-robust.json
            benchmark-results/latest-robust.csv
            docs/benchmark.md
            benchmark-results/comparison.json
