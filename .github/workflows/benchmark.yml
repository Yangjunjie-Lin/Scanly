name: Full Benchmark

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - architecture/sdk-v2-alpha3-industrial-validation
    paths:
      - "packages/**"
      - "engines/**"
      - "fixtures/**"
      - "scenarios/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run fixtures:generate
      - run: npm run scenarios:generate
      - name: Verify deterministic fixture and scenario generation
        run: git diff --exit-code -- fixtures scenarios
      - name: Verify clean checkout
        run: git status --porcelain --untracked-files=all | Tee-Object -Variable status; if ($status) { throw "prepare checkout is dirty" }

  profile:
    needs: prepare
    name: ${{ matrix.label }}
    runs-on: windows-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: fast
            label: Fast
            report: latest-fast
          - profile: balanced
            label: Balanced
            report: latest
          - profile: robust
            label: Robust
            report: latest-robust
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npx tsx scripts/run-benchmark.ts --ci-artifact --profile=${{ matrix.profile }} --gate --warmup-iterations=1 --measured-iterations=3
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.profile }}
          if-no-files-found: error
          path: |
            benchmark-results/ci/${{ matrix.report }}.json
            benchmark-results/ci/${{ matrix.report }}.csv

  comparison:
    needs: prepare
    name: Comparison
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run benchmark:compare -- --ci-artifact
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-comparison
          if-no-files-found: error
          path: benchmark-results/ci/comparison.json

  assemble:
    needs: [profile, comparison]
    name: Assemble
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          merge-multiple: true
          path: benchmark-artifacts
      - run: npx tsx scripts/assemble-benchmark-artifacts.ts --directory=benchmark-artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-assembled
          if-no-files-found: error
          path: benchmark-artifacts
