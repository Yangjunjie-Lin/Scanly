name: Browser Benchmark

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - architecture/sdk-v2-alpha3-industrial-validation

jobs:
  browser-benchmark:
    name: Browser Benchmark (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run fixtures:generate
      - run: npm run build
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npx playwright test -c playwright.benchmark.config.ts --project=${{ matrix.browser }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-benchmark-${{ matrix.browser }}
          if-no-files-found: error
          path: benchmark-results/browser/${{ matrix.browser }}.json
