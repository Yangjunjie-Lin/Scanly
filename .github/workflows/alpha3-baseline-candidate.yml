name: Alpha.3 Baseline Candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast:
    name: Fast
    uses: ./.github/workflows/baseline-candidate-profile.yml
    with: { profile: fast, report: latest-fast }
  balanced:
    name: Balanced
    uses: ./.github/workflows/baseline-candidate-profile.yml
    with: { profile: balanced, report: latest }
  robust:
    name: Robust
    uses: ./.github/workflows/baseline-candidate-profile.yml
    with: { profile: robust, report: latest-robust }
  comparison:
    name: Comparison
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run fixtures:generate
      - run: npm run scenarios:generate
      - run: git diff --exit-code -- fixtures scenarios
      - name: Verify clean comparison checkout
        run: git status --porcelain --untracked-files=all | Tee-Object -Variable status; if ($status) { throw "comparison checkout is dirty" }
      - run: npm run benchmark:compare -- --canonical-candidate --warmup-iterations=1 --measured-iterations=3
      - run: npm run benchmark:summary -- --report=benchmark-results/candidates/comparison.json
      - uses: actions/upload-artifact@v4
        with: { name: alpha3-comparison, path: benchmark-results/candidates/comparison.json, if-no-files-found: error, retention-days: 21 }
  assemble:
    name: Assemble
    needs: [fast, balanced, robust, comparison]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - uses: actions/download-artifact@v4
        with: { pattern: alpha3-*, merge-multiple: true, path: candidate }
      - run: npm run benchmark:assemble-canonical -- --fast=candidate/latest-fast.json --fast-csv=candidate/latest-fast.csv --balanced=candidate/latest.json --balanced-csv=candidate/latest.csv --robust=candidate/latest-robust.json --robust-csv=candidate/latest-robust.csv --comparison=candidate/comparison.json --output=candidate/canonical
      - run: npm run quality:static
      - run: npm run quality:evidence:bootstrap -- --canonical-manifest=candidate/canonical/canonical-evidence-manifest.json
      - run: npm run benchmark:summary -- --manifest=candidate/canonical/canonical-evidence-manifest.json
      - uses: actions/upload-artifact@v4
        with: { name: alpha3-baseline-candidate, path: candidate/canonical, if-no-files-found: error, retention-days: 21 }
