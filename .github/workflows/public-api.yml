name: Public API

on:
  pull_request:
  push:
    branches:
      - architecture/sdk-v2-alpha3-industrial-validation
      - architecture/sdk-v2-alpha4-zxing-cpp-wasm
      - develop/sdk-v2

jobs:
  public-api:
    name: Public API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:packages
      - run: npm run api:snapshot
      - run: npm run api:diff
      - run: npm run packages:smoke
      - run: npm run packages:tarball
