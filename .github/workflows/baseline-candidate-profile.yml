name: Alpha.3 Candidate Profile

on:
  workflow_call:
    inputs:
      profile: { required: true, type: string }
      report: { required: true, type: string }

jobs:
  profile:
    name: ${{ inputs.profile }}
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run fixtures:generate
      - run: npm run scenarios:generate
      - run: git diff --exit-code -- fixtures scenarios
      - run: npx tsx scripts/run-benchmark.ts --canonical-candidate --profile=${{ inputs.profile }} --gate --gate-mode=baseline-candidate --warmup-iterations=1 --measured-iterations=3
      - uses: actions/upload-artifact@v4
        with:
          name: alpha3-${{ inputs.profile }}
          if-no-files-found: error
          path: |
            benchmark-results/candidates/${{ inputs.report }}.json
            benchmark-results/candidates/${{ inputs.report }}.csv
