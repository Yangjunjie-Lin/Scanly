name: Publish Scanly v1.3.0

on:
  push:
    branches: [main]
    paths:
      - docs/releases/v1.3.0.md
      - .github/workflows/publish-v1.3.0.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify release version
        run: test "$(node -p "require('./package.json').version")" = "1.3.0"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.3.0 >/dev/null 2>&1; then
            echo "v1.3.0 already exists; no action needed."
            exit 0
          fi

          gh release create v1.3.0 \
            --target "$GITHUB_SHA" \
            --title "Scanly v1.3.0 — Stable Maintenance Release" \
            --notes-file docs/releases/v1.3.0.md \
            --latest
